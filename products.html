<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our wide range of products with smart expiry discounts.">
  <title>Products — ShopVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header" id="main-header"></header>

  <main class="page-wrapper">
    <div class="container">
      <div class="section-header" style="margin-top:32px;">
        <h2>All <span>Products</span></h2>
        <p>Browse, search, and filter our product catalog</p>
      </div>

      <!-- FILTERS -->
      <div class="filters-bar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search products..." oninput="debounceSearch()">
        </div>
        <select class="filter-select" id="categoryFilter" onchange="loadProducts()">
          <option value="all">All Categories</option>
        </select>
        <select class="filter-select" id="sortFilter" onchange="loadProducts()">
          <option value="newest">Newest First</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name_asc">Name: A → Z</option>
          <option value="expiry">Expiring Soon</option>
        </select>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="grid grid-4" id="productsGrid">
        <div class="loading-spinner" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>

      <!-- PAGINATION -->
      <div class="flex-center mt-xl gap-md" id="pagination"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">&copy; 2026 ShopVault. All rights reserved.</div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
