<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ShopVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="/" class="logo"><div class="logo-icon">🛒</div> ShopVault</a>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link active"><span class="icon">📊</span> Dashboard</a>
        <a href="/admin/products" class="sidebar-link"><span class="icon">📦</span> Products</a>
        <a href="/admin/orders" class="sidebar-link"><span class="icon">🛍️</span> Orders</a>
        <a href="/admin/customers" class="sidebar-link"><span class="icon">👥</span> Customers</a>
        <a href="/admin/reports" class="sidebar-link"><span class="icon">📈</span> Reports</a>
        <div style="margin-top:auto; padding-top:32px; border-top:1px solid var(--border); margin-top:32px;">
          <a href="/" class="sidebar-link"><span class="icon">🏪</span> View Store</a>
          <a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span> Logout</a>
        </div>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>📊 Dashboard</h1>
        <span style="color:var(--text-muted); font-size:14px;" id="adminGreeting"></span>
      </div>
      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid">
        <div class="loading-spinner" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>
      <!-- Additional Info -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:24px;" id="dashboardExtra"></div>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin/dashboard.js"></script>
</body>
</html>
