<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management — Admin — ShopVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/" class="logo"><div class="logo-icon">🛒</div> ShopVault</a>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="/admin/products" class="sidebar-link"><span class="icon">📦</span> Products</a>
        <a href="/admin/orders" class="sidebar-link active"><span class="icon">🛍️</span> Orders</a>
        <a href="/admin/customers" class="sidebar-link"><span class="icon">👥</span> Customers</a>
        <a href="/admin/reports" class="sidebar-link"><span class="icon">📈</span> Reports</a>
        <div style="margin-top:auto; padding-top:32px; border-top:1px solid var(--border); margin-top:32px;">
          <a href="/" class="sidebar-link"><span class="icon">🏪</span> View Store</a>
          <a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span> Logout</a>
        </div>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>🛍️ Order Management</h1>
        <select class="filter-select" id="statusFilter" onchange="loadOrders()">
          <option value="all">All Status</option>
          <option value="Pending">Pending</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Shipped">Shipped</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div class="table-container" id="ordersTable">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="orderModal">
    <div class="modal" style="max-width:650px;">
      <div class="modal-header">
        <h2 id="orderModalTitle">Order Details</h2>
        <button class="modal-close" onclick="document.getElementById('orderModal').classList.remove('active')">✕</button>
      </div>
      <div id="orderModalContent"></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/admin/orders.js"></script>
</body>
</html>
