<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management — Admin — ShopVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <a href="/" class="logo"><div class="logo-icon">🛒</div> ShopVault</a>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="/admin/products" class="sidebar-link active"><span class="icon">📦</span> Products</a>
        <a href="/admin/orders" class="sidebar-link"><span class="icon">🛍️</span> Orders</a>
        <a href="/admin/customers" class="sidebar-link"><span class="icon">👥</span> Customers</a>
        <a href="/admin/reports" class="sidebar-link"><span class="icon">📈</span> Reports</a>
        <div style="margin-top:auto; padding-top:32px; border-top:1px solid var(--border); margin-top:32px;">
          <a href="/" class="sidebar-link"><span class="icon">🏪</span> View Store</a>
          <a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span> Logout</a>
        </div>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>📦 Product Management</h1>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
      </div>
      <div class="table-container" id="productsTable">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="editProductId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input type="text" id="pName" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" id="pCategory" class="form-input" placeholder="e.g., Beverages">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input type="number" id="pPrice" class="form-input" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity (Stock)</label>
            <input type="number" id="pQuantity" class="form-input" min="0" value="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input type="date" id="pExpiry" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" id="pImage" class="form-input" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="pDescription" class="form-textarea" rows="3"></textarea>
        </div>
        <div style="display:flex; gap:12px; justify-content:flex-end;">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/admin/products.js"></script>
</body>
</html>
