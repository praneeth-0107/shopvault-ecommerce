<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your ShopVault account — Start shopping with secure payments.">
  <title>Register — ShopVault</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 16px; padding: 4px; transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--primary-light); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="/" class="logo" style="justify-content:center; margin-bottom:24px;">
            <div class="logo-icon">🛒</div> ShopVault
          </a>
          <h1>Create Account</h1>
          <p>Join ShopVault to start shopping with smart discounts</p>
        </div>
        <form id="registerForm">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="mobile">Mobile Number</label>
              <input type="tel" id="mobile" class="form-input" placeholder="9876543210" pattern="[0-9]{10}">
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="password-wrapper">
                <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" title="Show password">👁️</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="address">Address (Optional)</label>
            <textarea id="address" class="form-textarea" placeholder="Your delivery address" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">Create Account</button>
        </form>
        <div class="auth-footer">
          Already have an account? <a href="/login">Sign in →</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
